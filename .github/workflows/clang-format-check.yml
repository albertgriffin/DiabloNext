name: clang-format check

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formatting-check:
    name: clang-format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check changed C/C++ formatting
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
        elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
          base="${{ github.event.before }}"
          head="${{ github.sha }}"
        else
          base="$(git rev-list --max-parents=0 HEAD)"
          head="HEAD"
        fi

        mapfile -t files < <(
          git diff --name-only --diff-filter=ACMRT "${base}" "${head}" -- Source test \
            | grep -E '\.((c|C)(c|pp|xx|\+\+)?|(h|H)h?(pp|xx|\+\+)?|ino|pde|proto|cu)$' \
            || true
        )

        if [[ ${#files[@]} -eq 0 ]]; then
          echo "No changed C/C++ files to format-check."
          exit 0
        fi

        printf 'Checking clang-format for changed files:\n'
        printf '  %s\n' "${files[@]}"

        docker run --rm \
          --volume "${PWD}:${PWD}" \
          --workdir "${PWD}" \
          ghcr.io/jidicula/clang-format:18 \
          --dry-run \
          --Werror \
          --style=file \
          --fallback-style=llvm \
          "${files[@]}"
